name: Build and Upload Lytee ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y live-build git

      - name: Build Lytee ISO
        run: |
          chmod +x build.sh
          sudo ./build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: lytee-iso
          path: live-image-amd64.hybrid.iso
